<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 2rem; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.5rem; margin-bottom: 1.5rem; }
  label { font-size: 13px; font-weight: 500; color: #444; display: block; margin-bottom: 6px; }
  input[type="text"] { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  input:focus { border-color: #333; }
  .row { display: flex; gap: 10px; }
  .row input { flex: 1; }
  button { padding: 10px 20px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .ad-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
  .output { display: none; margin-top: 1.5rem; }
  .field-label { font-size: 11px; font-weight: 600; color: #888; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
  .field-value { font-size: 14px; line-height: 1.6; }
  .copy-btn { font-size: 11px; padding: 3px 10px; background: #fff; color: #555; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; margin-top: 6px; }
  hr { border: none; border-top: 1px solid #eee; margin: 1rem 0; }
  .error { color: #cc0000; font-size: 13px; margin-top: 8px; display: none; }
  .loading { display: none; font-size: 14px; color: #666; margin-top: 10px; }
  .history-entry { border-top: 1px solid #eee; padding: 10px 0; }
  .history-topic { font-size: 13px; font-weight: 500; }
  .history-date { font-size: 11px; color: #aaa; }
  .toggle { font-size: 12px; color: #0066cc; cursor: pointer; }
  .history-detail { display: none; font-size: 13px; color: #555; line-height: 1.6; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>Ad Generator</h1>
  <p class="subtitle">Generate square image ad variations based on your approved template.</p>

  <div class="card">
    <label>Topic / Onderwerp</label>
    <div class="row">
      <input type="text" id="topic" placeholder="e.g. drinks that impact bone density" onkeydown="if(event.key==='Enter')generate()" />
      <button id="gen-btn" onclick="generate()">Generate</button>
    </div>
    <p class="error" id="error"></p>
    <p class="loading" id="loading">Generating...</p>

    <div class="output" id="output">
      <hr>
      <div class="ad-wrap">
        <div id="ad-svg-container"></div>
      </div>
      <div style="margin-bottom:16px">
        <div class="field-label">Creative Script</div>
        <div class="field-value" id="out-script"></div>
        <button class="copy-btn" onclick="copyEl('out-script',this)">Copy</button>
      </div>
      <hr>
      <div style="margin-bottom:16px">
        <div class="field-label">Text</div>
        <div class="field-value" id="out-text"></div>
        <button class="copy-btn" onclick="copyEl('out-text',this)">Copy</button>
      </div>
      <hr>
      <div style="margin-bottom:16px">
        <div class="field-label">Headline</div>
        <div class="field-value" id="out-headline"></div>
        <button class="copy-btn" onclick="copyEl('out-headline',this)">Copy</button>
      </div>
      <button onclick="copyAll()" style="background:#fff;color:#1a1a1a;border:1px solid #ddd;font-size:13px;padding:7px 14px;">Copy All</button>
    </div>
  </div>

  <div class="card" id="history-card" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <label style="margin:0">History <span id="hcount" style="background:#f0f0f0;border-radius:20px;padding:2px 10px;font-size:11px;color:#555;margin-left:6px">0</span></label>
      <button onclick="clearHistory()" style="background:#fff;color:#cc0000;border:1px solid #eee;font-size:12px;padding:4px 10px">Clear</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<script>
let history = [];

async function generate() {
  const topic = document.getElementById('topic').value.trim();
  const err = document.getElementById('error');
  err.style.display = 'none';
  if (!topic) { err.textContent = 'Please enter a topic.'; err.style.display = 'block'; return; }

  document.getElementById('gen-btn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('output').style.display = 'none';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic })
    });
    if (!res.ok) throw new Error((await res.json()).error || 'Server error');
    const d = await res.json();

    renderAdSVG(d.white, d.yellow);
    document.getElementById('out-script').innerHTML =
      `${d.white} <span style="color:#b8860b;font-weight:600">${d.yellow}</span>`;
    document.getElementById('out-text').textContent = d.text;
    document.getElementById('out-headline').textContent = d.headline;
    document.getElementById('output').style.display = 'block';

    history.unshift({ topic, script: `${d.white} ${d.yellow}`, text: d.text, headline: d.headline, date: new Date().toLocaleTimeString() });
    renderHistory();
  } catch(e) {
    err.textContent = 'Error: ' + e.message; err.style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('gen-btn').disabled = false;
  }
}

function wrapText(words, maxChars) {
  const lines = []; let line = '';
  for (const w of words) {
    if ((line + ' ' + w).trim().length > maxChars) { lines.push(line.trim()); line = w; }
    else line = (line + ' ' + w).trim();
  }
  if (line) lines.push(line.trim());
  return lines;
}

function renderAdSVG(white, yellow) {
  const size = 440;
  const allWords = (white + ' ' + yellow).toUpperCase().split(' ');
  const yellowWords = yellow.toUpperCase().split(' ');
  const whiteWords = white.toUpperCase().split(' ');
  const lines = wrapText(allWords, 18);
  const fontSize = 38;
  const lineH = 46;
  const totalTextH = lines.length * lineH;
  const startY = (size - totalTextH - 60) / 2 + lineH;

  const textEls = lines.map((line, i) => {
    const y = startY + i * lineH;
    const wordsInLine = line.split(' ');
    const spans = wordsInLine.map(w => {
      const isYellow = yellowWords.includes(w);
      return `<tspan fill="${isYellow ? '#FFE500' : '#ffffff'}">${w} </tspan>`;
    }).join('');
    return `<text x="220" y="${y}" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="${fontSize}" font-weight="900">${spans}</text>`;
  }).join('');

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" style="border-radius:8px;display:block;">
    <rect width="${size}" height="${size}" fill="#000"/>
    ${textEls}
    <text x="220" y="${size - 36}" text-anchor="middle" font-family="Impact,'Arial Black',sans-serif" font-size="24" font-weight="700" fill="#ffffff" letter-spacing="3">LEARN MORE</text>
  </svg>`;
  document.getElementById('ad-svg-container').innerHTML = svg;
}

function copyEl(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).innerText);
  btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = 'Copy', 1500);
}

function copyAll() {
  const s = document.getElementById('out-script').innerText;
  const t = document.getElementById('out-text').innerText;
  const h = document.getElementById('out-headline').innerText;
  navigator.clipboard.writeText(`Creative Script:\n${s}\n\nText:\n${t}\n\nHeadline:\n${h}`);
}

function renderHistory() {
  if (history.length < 2) return;
  document.getElementById('history-card').style.display = 'block';
  document.getElementById('hcount').textContent = history.length;
  document.getElementById('history-list').innerHTML = history.map((e,i) => `
    <div class="history-entry">
      <div class="history-topic">${e.topic}</div>
      <div class="history-date">${e.date}</div>
      <span class="toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'">Show output ▾</span>
      <div class="history-detail"><strong>Script:</strong> ${e.script}<br><strong>Text:</strong> ${e.text}<br><strong>Headline:</strong> ${e.headline}</div>
    </div>`).join('');
}

function clearHistory() {
  history = [];
  document.getElementById('history-card').style.display = 'none';
}
</script>
</body>
</html>
