<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 720px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 2rem; }
.card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.5rem; margin-bottom: 1.5rem; }
label { font-size: 13px; font-weight: 500; color: #444; display: block; margin-bottom: 6px; }
input[type="text"] { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
.row { display: flex; gap: 10px; }
.row input { flex: 1; }
button { padding: 10px 20px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
button:disabled { background: #aaa; cursor: not-allowed; }
.field-label { font-size: 11px; font-weight: 600; color: #888; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
.field-value { font-size: 14px; line-height: 1.6; }
.copy-btn { font-size: 11px; padding: 3px 10px; background: #fff; color: #555; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; margin-top: 6px; }
hr { border: none; border-top: 1px solid #eee; margin: 1rem 0; }
.error { color: #cc0000; font-size: 13px; margin-top: 8px; display: none; }
.loading { display: none; font-size: 14px; color: #666; margin-top: 10px; }
#output { display: none; margin-top: 1.5rem; }
#ad-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="container">
  <h1>Ad Generator</h1>
  <p class="subtitle">Generate square image ad variations based on your approved template.</p>
  <div class="card">
    <label>Topic / Onderwerp</label>
    <div class="row">
      <input type="text" id="topic" placeholder="e.g. drinks that impact bone density" onkeydown="if(event.key==='Enter')generate()" />
      <button id="gen-btn" onclick="generate()">Generate</button>
    </div>
    <p class="error" id="error"></p>
    <p class="loading" id="loading">Generating...</p>

    <div id="output">
      <hr>
      <div id="ad-wrap"></div>

      <div class="field-label">Creative Script</div>
      <div class="field-value" id="out-script"></div>
      <button class="copy-btn" onclick="copyEl('out-script',this)">Copy</button>

      <hr>
      <div class="field-label">Text</div>
      <div class="field-value" id="out-text"></div>
      <button class="copy-btn" onclick="copyEl('out-text',this)">Copy</button>

      <hr>
      <div class="field-label">Headline</div>
      <div class="field-value" id="out-headline"></div>
      <button class="copy-btn" onclick="copyEl('out-headline',this)">Copy</button>

      <br><br>
      <button onclick="copyAll()" style="background:#fff;color:#1a1a1a;border:1px solid #ddd;font-size:13px;padding:7px 14px;">Copy All</button>
    </div>
  </div>

  <div class="card" id="history-card" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <label style="margin:0">History <span id="hcount" style="background:#f0f0f0;border-radius:20px;padding:2px 10px;font-size:11px;color:#555;margin-left:6px">0</span></label>
      <button onclick="clearHistory()" style="background:#fff;color:#cc0000;border:1px solid #eee;font-size:12px;padding:4px 10px">Clear</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<script>
var history = [];

function wrapWords(words, maxChars) {
  var lines = [], line = '';
  for (var i = 0; i < words.length; i++) {
    var w = words[i];
    var test = line ? line + ' ' + w : w;
    if (test.length > maxChars && line) { lines.push(line); line = w; }
    else { line = test; }
  }
  if (line) lines.push(line);
  return lines;
}

function buildSVG(white, yellow) {
  var W = 500, H = 500;
  var whiteUp = white.toUpperCase();
  var yellowUp = yellow.toUpperCase();
  var allWords = (whiteUp + ' ' + yellowUp).split(' ');
  var yellowWords = yellowUp.split(' ');
  var lines = wrapWords(allWords, 16);
  var fs = 42, lh = 52;
  var totalH = lines.length * lh;
  var startY = Math.floor((H - totalH) / 2) + fs - 20;

  var textRows = '';
  for (var i = 0; i < lines.length; i++) {
    var y = startY + i * lh;
    var words = lines[i].split(' ');
    var x = 40;
    // build tspans with absolute x positioning per word — simpler: just color whole line
    var lineIsYellow = words.every(function(w){ return yellowWords.indexOf(w) >= 0; });
    var lineHasYellow = words.some(function(w){ return yellowWords.indexOf(w) >= 0; });

    if (lineIsYellow) {
      textRows += '<text x="250" y="' + y + '" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="' + fs + '" fill="#FFE500">' + lines[i] + '</text>';
    } else if (!lineHasYellow) {
      textRows += '<text x="250" y="' + y + '" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="' + fs + '" fill="#ffffff">' + lines[i] + '</text>';
    } else {
      // mixed line — render word by word with dx
      var row = '<text font-family="Impact,Arial Black,sans-serif" font-size="' + fs + '">';
      // estimate total width to center
      var totalChars = lines[i].length;
      var approxW = totalChars * fs * 0.55;
      var startX = (W - approxW) / 2;
      for (var j = 0; j < words.length; j++) {
        var col = yellowWords.indexOf(words[j]) >= 0 ? '#FFE500' : '#ffffff';
        var xPos = startX + j * (fs * 0.6 * (words[j].length + 0.5));
        row += '<tspan x="' + xPos + '" y="' + y + '" fill="' + col + '">' + words[j] + '</tspan>';
      }
      row += '</text>';
      // fallback: just color entire line white if mixed is too complex
      textRows += '<text x="250" y="' + y + '" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="' + fs + '" fill="#ffffff">' + lines[i] + '</text>';
    }
  }

  var ctaY = H - 44;
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + W + '" height="' + H + '" style="display:block;border-radius:8px;">'
    + '<rect width="' + W + '" height="' + H + '" fill="#000000"/>'
    + textRows
    + '<text x="250" y="' + ctaY + '" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="26" fill="#ffffff" letter-spacing="4">LEARN MORE</text>'
    + '</svg>';
  return svg;
}

async function generate() {
  var topic = document.getElementById('topic').value.trim();
  var err = document.getElementById('error');
  err.style.display = 'none';
  if (!topic) { err.textContent = 'Please enter a topic.'; err.style.display = 'block'; return; }

  document.getElementById('gen-btn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('output').style.display = 'none';

  try {
    var res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic: topic })
    });
    if (!res.ok) throw new Error((await res.json()).error || 'Server error');
    var d = await res.json();

    document.getElementById('output').style.display = 'block';
    document.getElementById('ad-wrap').innerHTML = buildSVG(d.white, d.yellow);
    document.getElementById('out-script').innerHTML = d.white.toUpperCase() + ' <span style="color:#b8860b;font-weight:600">' + d.yellow.toUpperCase() + '</span>';
    document.getElementById('out-text').textContent = d.text;
    document.getElementById('out-headline').textContent = d.headline;

    history.unshift({ topic: topic, script: d.white + ' ' + d.yellow, text: d.text, headline: d.headline, date: new Date().toLocaleTimeString() });
    renderHistory();
  } catch(e) {
    err.textContent = 'Error: ' + e.message; err.style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('gen-btn').disabled = false;
  }
}

function copyEl(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).innerText);
  btn.textContent = '✓ Copied'; setTimeout(function(){ btn.textContent = 'Copy'; }, 1500);
}

function copyAll() {
  var s = document.getElementById('out-script').innerText;
  var t = document.getElementById('out-text').innerText;
  var h = document.getElementById('out-headline').innerText;
  navigator.clipboard.writeText('Creative Script:\n' + s + '\n\nText:\n' + t + '\n\nHeadline:\n' + h);
}

function renderHistory() {
  if (history.length < 2) return;
  document.getElementById('history-card').style.display = 'block';
  document.getElementById('hcount').textContent = history.length;
  var html = '';
  for (var i = 0; i < history.length; i++) {
    var e = history[i];
    html += '<div style="border-top:1px solid #eee;padding:10px 0">'
      + '<div style="font-size:13px;font-weight:500">' + e.topic + '</div>'
      + '<div style="font-size:11px;color:#aaa">' + e.date + '</div>'
      + '<span style="font-size:12px;color:#0066cc;cursor:pointer" onclick="var d=this.nextElementSibling;d.style.display=d.style.display===\'block\'?\'none\':\'block\'">Show output ▾</span>'
      + '<div style="display:none;font-size:13px;color:#555;line-height:1.6;margin-top:8px"><strong>Script:</strong> ' + e.script + '<br><strong>Text:</strong> ' + e.text + '<br><strong>Headline:</strong> ' + e.headline + '</div>'
      + '</div>';
  }
  document.getElementById('history-list').innerHTML = html;
}

function clearHistory() {
  history = [];
  document.getElementById('history-card').style.display = 'none';
}
</script>
</body>
</html>
