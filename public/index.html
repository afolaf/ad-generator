<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 2rem; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.5rem; margin-bottom: 1.5rem; }
  label { font-size: 13px; font-weight: 500; color: #444; display: block; margin-bottom: 6px; }
  input[type="text"] { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  input:focus { border-color: #333; }
  .row { display: flex; gap: 10px; }
  .row input { flex: 1; }
  button { padding: 10px 20px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .ad-preview { background: #cc0000; border-radius: 10px; padding: 18px 20px; margin-bottom: 20px; }
  .ad-label { color: rgba(255,255,255,0.7); font-size: 11px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }
  .ad-script { color: #FFD700; font-size: 17px; font-weight: 700; line-height: 1.35; margin-bottom: 12px; }
  .ad-cta { color: #fff; font-size: 13px; font-weight: 600; border: 1.5px solid rgba(255,255,255,0.6); display: inline-block; padding: 4px 14px; border-radius: 20px; }
  .output { display: none; margin-top: 1.5rem; }
  .field-label { font-size: 11px; font-weight: 600; color: #888; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
  .field-value { font-size: 14px; line-height: 1.6; }
  .copy-btn { font-size: 11px; padding: 3px 10px; background: #fff; color: #555; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; margin-top: 6px; }
  hr { border: none; border-top: 1px solid #eee; margin: 1rem 0; }
  .error { color: #cc0000; font-size: 13px; margin-top: 8px; display: none; }
  .loading { display: none; font-size: 14px; color: #666; margin-top: 10px; }
  .history-entry { border-top: 1px solid #eee; padding: 10px 0; }
  .history-topic { font-size: 13px; font-weight: 500; }
  .history-date { font-size: 11px; color: #aaa; }
  .toggle { font-size: 12px; color: #0066cc; cursor: pointer; }
  .history-detail { display: none; font-size: 13px; color: #555; line-height: 1.6; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>Ad Generator</h1>
  <p class="subtitle">Generate ad variations based on your approved template.</p>

  <div class="card">
    <label>Topic / Onderwerp</label>
    <div class="row">
      <input type="text" id="topic" placeholder="e.g. 3 vegetables that help you sleep better" onkeydown="if(event.key==='Enter')generate()" />
      <button id="gen-btn" onclick="generate()">Generate</button>
    </div>
    <p class="error" id="error"></p>
    <p class="loading" id="loading">Generating...</p>

    <div class="output" id="output">
      <hr>
      <div class="ad-preview">
        <div class="ad-label">Creative Script</div>
        <div class="ad-script" id="out-script"></div>
        <div class="ad-cta">Learn More</div>
      </div>
      <div style="margin-bottom:16px">
        <div class="field-label">Text</div>
        <div class="field-value" id="out-text"></div>
        <button class="copy-btn" onclick="copy('out-text',this)">Copy</button>
      </div>
      <hr>
      <div style="margin-bottom:16px">
        <div class="field-label">Headline</div>
        <div class="field-value" id="out-headline"></div>
        <button class="copy-btn" onclick="copy('out-headline',this)">Copy</button>
      </div>
      <button onclick="copyAll()" style="background:#fff;color:#1a1a1a;border:1px solid #ddd;font-size:13px;padding:7px 14px;">Copy All</button>
    </div>
  </div>

  <div class="card" id="history-card" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <label style="margin:0">History <span id="hcount" style="background:#f0f0f0;border-radius:20px;padding:2px 10px;font-size:11px;color:#555;margin-left:6px">0</span></label>
      <button onclick="clearHistory()" style="background:#fff;color:#cc0000;border:1px solid #eee;font-size:12px;padding:4px 10px">Clear</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<script>
let history = [];

async function generate() {
  const topic = document.getElementById('topic').value.trim();
  const err = document.getElementById('error');
  err.style.display = 'none';
  if (!topic) { err.textContent = 'Please enter a topic.'; err.style.display = 'block'; return; }

  document.getElementById('gen-btn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('output').style.display = 'none';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic })
    });
    if (!res.ok) throw new Error((await res.json()).error || 'Server error');
    const d = await res.json();

    document.getElementById('out-script').textContent = d.script;
    document.getElementById('out-text').textContent = d.text;
    document.getElementById('out-headline').textContent = d.headline;
    document.getElementById('output').style.display = 'block';

    history.unshift({ topic, ...d, date: new Date().toLocaleTimeString() });
    renderHistory();
  } catch(e) {
    err.textContent = 'Error: ' + e.message; err.style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('gen-btn').disabled = false;
  }
}

function copy(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent);
  btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = 'Copy', 1500);
}

function copyAll() {
  const s = document.getElementById('out-script').textContent;
  const t = document.getElementById('out-text').textContent;
  const h = document.getElementById('out-headline').textContent;
  navigator.clipboard.writeText(`Creative Script:\n${s}\n\nText:\n${t}\n\nHeadline:\n${h}`);
}

function renderHistory() {
  if (history.length < 2) return;
  document.getElementById('history-card').style.display = 'block';
  document.getElementById('hcount').textContent = history.length;
  document.getElementById('history-list').innerHTML = history.map((e,i) => `
    <div class="history-entry">
      <div class="history-topic">${e.topic}</div>
      <div class="history-date">${e.date}</div>
      <span class="toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'">Show output ▾</span>
      <div class="history-detail"><strong>Script:</strong> ${e.script}<br><strong>Text:</strong> ${e.text}<br><strong>Headline:</strong> ${e.headline}</div>
    </div>`).join('');
}

function clearHistory() {
  history = [];
  document.getElementById('history-card').style.display = 'none';
}
</script>
</body>
</html>
