<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 720px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.sub { font-size: 14px; color: #666; margin-bottom: 2rem; }
.card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.5rem; margin-bottom: 1.5rem; }
input[type="text"] { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
.row { display: flex; gap: 10px; }
.row input { flex: 1; }
.btn-main { padding: 10px 20px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.btn-main:disabled { background: #aaa; cursor: not-allowed; }
.btn-sec { margin-top: 10px; background: #fff; color: #1a1a1a; border: 1px solid #ddd; font-size: 13px; padding: 7px 14px; border-radius: 8px; cursor: pointer; }
.btn-sec:disabled { opacity: 0.5; cursor: not-allowed; }
.lbl { font-size: 11px; font-weight: 600; color: #888; letter-spacing: 0.5px; text-transform: uppercase; margin: 16px 0 6px; }
.val { font-size: 14px; line-height: 1.6; color: #1a1a1a; }
.cbtn { font-size: 11px; padding: 3px 10px; background: #fff; color: #555; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; margin-top: 6px; }
hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
.err { color: #cc0000; font-size: 13px; margin-top: 8px; display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>Ad Generator</h1>
  <p class="sub">Generate square image ad variations based on your approved template.</p>

  <div class="card">
    <div style="font-size:13px;font-weight:500;color:#444;margin-bottom:6px;">Topic / Onderwerp</div>
    <div class="row">
      <input type="text" id="topic" placeholder="e.g. drinks that impact bone density" onkeydown="if(event.key==='Enter')generate()" />
      <button class="btn-main" id="genbtn" onclick="generate()">Generate</button>
    </div>
    <button class="btn-sec" id="randbtn" onclick="randomTopic()">🎲 Random Topic</button>
    <div class="err" id="errmsg"></div>
  </div>

  <div class="card" id="adcard" style="display:none;">
    <div style="display:flex;justify-content:center;margin-bottom:20px;">
      <canvas id="adcanvas" width="460" height="460" style="border-radius:8px;display:block;"></canvas>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="btn-sec" style="margin-top:0;" onclick="downloadPNG()">Download PNG</button>
      <button onclick="saveZIP()" style="margin-top:0;background:#1a1a1a;color:#fff;border:none;font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;">💾 Save Ad (ZIP)</button>
    </div>
    <hr>
    <div class="lbl">Creative Script</div>
    <div class="val" id="outscript"></div>
    <div class="val" style="font-weight:600;margin-top:4px;">Learn More</div>
    <button class="cbtn" onclick="cp('outscript',this)">Copy</button>
    <hr>
    <div class="lbl">Text</div>
    <div class="val" id="outtext"></div>
    <button class="cbtn" onclick="cp('outtext',this)">Copy</button>
    <hr>
    <div class="lbl">Headline</div>
    <div class="val" id="outheadline"></div>
    <button class="cbtn" onclick="cp('outheadline',this)">Copy</button>
    <br><br>
    <button class="btn-sec" style="margin-top:0;" onclick="cpAll()">Copy All</button>
  </div>
</div>

<script>
var usedTopics = [];

async function randomTopic() {
  var btn = document.getElementById('randbtn');
  var err = document.getElementById('errmsg');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '⏳ Loading...';
  try {
    var r = await fetch('/api/random-topic', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({used: usedTopics})
    });
    var d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Server error');
    usedTopics.push(d.topic);
    document.getElementById('topic').value = d.topic;
    await generate();
  } catch(e) {
    err.textContent = 'Error: ' + e.message;
    err.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = '🎲 Random Topic';
}

async function generate() {
  var topic = document.getElementById('topic').value.trim();
  var err = document.getElementById('errmsg');
  err.style.display = 'none';
  if (!topic) { err.textContent = 'Please enter a topic.'; err.style.display = 'block'; return; }

  var btn = document.getElementById('genbtn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  try {
    var r = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({topic: topic})
    });
    var d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Server error');

    var w = d.white.toUpperCase();
    var y = d.yellow.toUpperCase();
    drawCanvas(w, y);
    document.getElementById('outscript').innerHTML = w + ' <span style="color:#b8860b;font-weight:600">' + y + '</span>';
    document.getElementById('outtext').textContent = d.text;
    document.getElementById('outheadline').textContent = d.headline;
    document.getElementById('adcard').style.display = 'block';
  } catch(e) {
    err.textContent = 'Error: ' + e.message;
    err.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'Generate';
}

function drawCanvas(white, yellow) {
  var c = document.getElementById('adcanvas');
  var ctx = c.getContext('2d');
  var W = 460, H = 460;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  var fontSize = 36;
  ctx.font = '900 ' + fontSize + 'px Impact, Arial Black, Arial';
  ctx.textAlign = 'left';

  var allWords = (white + ' ' + yellow).split(' ');
  var yellowWords = yellow.split(' ');

  // Word wrap
  var lines = [], cur = '';
  for (var i = 0; i < allWords.length; i++) {
    var test = cur ? cur + ' ' + allWords[i] : allWords[i];
    if (ctx.measureText(test).width > 400 && cur) { lines.push(cur); cur = allWords[i]; }
    else cur = test;
  }
  if (cur) lines.push(cur);

  var lh = fontSize + 12;
  var totalH = lines.length * lh;
  var startY = (H - totalH) / 2 + fontSize - 10;

  for (var l = 0; l < lines.length; l++) {
    var lineWords = lines[l].split(' ');
    var lineW = ctx.measureText(lines[l] + ' '.repeat(lineWords.length - 1)).width;
    // center by measuring full line
    var fullW = ctx.measureText(lines[l]).width;
    var x = (W - fullW) / 2;
    var y = startY + l * lh;
    for (var w = 0; w < lineWords.length; w++) {
      var word = lineWords[w];
      ctx.fillStyle = yellowWords.indexOf(word) >= 0 ? '#FFE500' : '#ffffff';
      ctx.fillText(word, x, y);
      x += ctx.measureText(word + ' ').width;
    }
  }

  ctx.font = '700 22px Impact, Arial Black, Arial';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText('LEARN MORE', W / 2, H - 36);
}

function downloadPNG() {
  var a = document.createElement('a');
  a.download = 'ad.png';
  a.href = document.getElementById('adcanvas').toDataURL('image/png');
  a.click();
}

async function saveZIP() {
  var topic = document.getElementById('topic').value.trim();
  var slug = topic.replace(/[^a-z0-9]/gi,'_').toLowerCase().slice(0,40);
  var date = new Date().toISOString().slice(0,10);
  var script = document.getElementById('outscript').innerText;
  var text = document.getElementById('outtext').innerText;
  var headline = document.getElementById('outheadline').innerText;
  var txt = 'Topic: ' + topic + '\n\nCreative Script:\n' + script + '\nLearn More\n\nText:\n' + text + '\n\nHeadline:\n' + headline;
  var zip = new JSZip();
  zip.file('ad.png', document.getElementById('adcanvas').toDataURL('image/png').split(',')[1], {base64:true});
  zip.file('copy.txt', txt);
  var blob = await zip.generateAsync({type:'blob'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = slug + '_' + date + '.zip';
  a.click();
}

function cp(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).innerText);
  btn.textContent = '✓ Copied';
  setTimeout(function(){ btn.textContent = 'Copy'; }, 1500);
}

function cpAll() {
  var s = document.getElementById('outscript').innerText;
  var t = document.getElementById('outtext').innerText;
  var h = document.getElementById('outheadline').innerText;
  navigator.clipboard.writeText('Creative Script:\n' + s + '\nLearn More\n\nText:\n' + t + '\n\nHeadline:\n' + h);
}
</script>
</body>
</html>
