<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 720px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
p.sub { font-size: 14px; color: #666; margin-bottom: 2rem; }
.card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.5rem; margin-bottom: 1.5rem; }
input[type="text"] { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; width: 100%; }
.row { display: flex; gap: 10px; }
button.main { padding: 10px 20px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
button.main:disabled { background: #aaa; }
.lbl { font-size: 11px; font-weight: 600; color: #888; letter-spacing: 0.5px; text-transform: uppercase; margin: 16px 0 6px; }
.val { font-size: 14px; line-height: 1.6; color: #1a1a1a; }
.cbtn { font-size: 11px; padding: 3px 10px; background: #fff; color: #555; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; margin-top: 6px; }
hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
.err { color: #cc0000; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>Ad Generator</h1>
  <p class="sub">Generate square image ad variations based on your approved template.</p>

  <div class="card">
    <div style="font-size:13px;font-weight:500;color:#444;margin-bottom:6px">Topic / Onderwerp</div>
    <div class="row">
      <input type="text" id="topic" placeholder="e.g. drinks that impact bone density" onkeydown="if(event.key==='Enter')go()" />
      <button class="main" id="btn" onclick="go()">Generate</button>
    </div>
    <div id="err" class="err" style="display:none"></div>
  </div>

  <!-- AD PREVIEW — always in DOM, shown after generate -->
  <div id="ad-card" class="card" style="display:none">
    <div style="display:flex;justify-content:center;">
      <div id="ad-box" style="width:460px;height:460px;background:#000;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 36px;gap:0;">
        <div id="ad-text" style="color:#fff;font-size:34px;font-weight:900;text-align:center;line-height:1.2;text-transform:uppercase;font-family:Impact,'Arial Black',Arial,sans-serif;flex:1;display:flex;align-items:center;justify-content:center;"></div>
        <div style="color:#fff;font-size:22px;font-weight:700;text-align:center;letter-spacing:3px;text-transform:uppercase;font-family:Impact,'Arial Black',Arial,sans-serif;padding-top:24px;">LEARN MORE</div>
      </div>
    </div>

    <hr>

    <div class="lbl">Creative Script</div>
    <div class="val" id="out-script"></div>
    <button class="cbtn" onclick="cp('out-script',this)">Copy</button>

    <hr>

    <div class="lbl">Text</div>
    <div class="val" id="out-text"></div>
    <button class="cbtn" onclick="cp('out-text',this)">Copy</button>

    <hr>

    <div class="lbl">Headline</div>
    <div class="val" id="out-headline"></div>
    <button class="cbtn" onclick="cp('out-headline',this)">Copy</button>

    <br><br>
    <button onclick="cpAll()" style="background:#fff;color:#1a1a1a;border:1px solid #ddd;font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;">Copy All</button>
  </div>
</div>

<script>
async function go() {
  var topic = document.getElementById('topic').value.trim();
  var err = document.getElementById('err');
  err.style.display = 'none';
  if (!topic) { err.textContent = 'Please enter a topic.'; err.style.display = 'block'; return; }

  var btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  try {
    var res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic: topic })
    });
    var d = await res.json();
    if (!res.ok) throw new Error(d.error || 'Server error');

    // Build ad text with yellow highlight
    var wU = d.white.toUpperCase();
    var yU = d.yellow.toUpperCase();
    document.getElementById('ad-text').innerHTML =
      '<span style="color:#fff">' + wU + '</span> <span style="color:#FFE500">' + yU + '</span>';

    document.getElementById('out-script').innerHTML =
      wU + ' <span style="color:#b8860b;font-weight:600">' + yU + '</span>';
    document.getElementById('out-text').textContent = d.text;
    document.getElementById('out-headline').textContent = d.headline;

    document.getElementById('ad-card').style.display = 'block';
  } catch(e) {
    err.textContent = 'Error: ' + e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate';
  }
}

function cp(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).innerText);
  btn.textContent = '✓ Copied';
  setTimeout(function(){ btn.textContent = 'Copy'; }, 1500);
}

function cpAll() {
  var s = document.getElementById('out-script').innerText;
  var t = document.getElementById('out-text').innerText;
  var h = document.getElementById('out-headline').innerText;
  navigator.clipboard.writeText('Creative Script:\n' + s + '\n\nText:\n' + t + '\n\nHeadline:\n' + h);
}
</script>
</body>
</html>
