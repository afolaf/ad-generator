<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 720px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
p.sub { font-size: 14px; color: #666; margin-bottom: 2rem; }
.card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.5rem; margin-bottom: 1.5rem; }
input[type="text"] { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; width: 100%; }
.row { display: flex; gap: 10px; }
button.main { padding: 10px 20px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
button.main:disabled { background: #aaa; }
.lbl { font-size: 11px; font-weight: 600; color: #888; letter-spacing: 0.5px; text-transform: uppercase; margin: 16px 0 6px; }
.val { font-size: 14px; line-height: 1.6; color: #1a1a1a; }
.cbtn { font-size: 11px; padding: 3px 10px; background: #fff; color: #555; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; margin-top: 6px; }
hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
.err { color: #cc0000; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>Ad Generator</h1>
  <p class="sub">Generate square image ad variations based on your approved template.</p>

  <div class="card">
    <div style="font-size:13px;font-weight:500;color:#444;margin-bottom:6px">Topic / Onderwerp</div>
    <div class="row">
      <input type="text" id="topic" placeholder="e.g. drinks that impact bone density" onkeydown="if(event.key==='Enter')go()" />
      <button class="main" id="btn" onclick="go()">Generate</button>
    </div>
    <button onclick="randomize()" style="margin-top:10px;background:#fff;color:#1a1a1a;border:1px solid #ddd;font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;">🎲 Random Topic</button>
    <div id="err" class="err" style="display:none"></div>
  </div>

  <!-- AD PREVIEW — always in DOM, shown after generate -->
  <div id="ad-card" class="card" style="display:none">
    <div style="display:flex;justify-content:center;">
      <canvas id="ad-canvas" width="460" height="460" style="border-radius:8px;display:block;"></canvas>
      <br>
      <button onclick="dlAd()" style="background:#fff;color:#1a1a1a;border:1px solid #ddd;font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;">Download PNG</button>
    </div>

    <hr>

    <div class="lbl">Creative Script</div>
    <div class="val" id="out-script"></div>
    <div class="val" style="font-weight:600;margin-top:4px;">Learn More</div>
    <button class="cbtn" onclick="cp('out-script',this)">Copy</button>

    <hr>

    <div class="lbl">Text</div>
    <div class="val" id="out-text"></div>
    <button class="cbtn" onclick="cp('out-text',this)">Copy</button>

    <hr>

    <div class="lbl">Headline</div>
    <div class="val" id="out-headline"></div>
    <button class="cbtn" onclick="cp('out-headline',this)">Copy</button>

    <br><br>
    <button onclick="cpAll()" style="background:#fff;color:#1a1a1a;border:1px solid #ddd;font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;">Copy All</button>
  </div>
</div>

<script>
var topics = [
  'what vitamin deficiency might cause memory problems',
  '3 mistakes people make when caring for a spouse with dementia',
  'what happens when you take creatine before bed',
  'signs you might have a vitamin deficiency',
  'everyday snacks that could help your brain stay sharp',
  'what vitamin deficiency might cause neck pain',
  'dangerous habits to avoid as you get older',
  '3 mistakes people make when using a home blood pressure monitor',
  'what doctors may want you to know about bone density',
  'what vitamin deficiency might cause joint stiffness',
  'foods that may be damaging your liver',
  '3 signs you might have a sinus infection',
  'what may cause leg pain and tiredness',
  'what vitamin deficiency might cause itchy skin',
  'everyday habits that might slow down aging',
  'what rheumatologists may want you to know about joint health',
  'is it safe to eat bread if you cut the mold off',
  '3 mistakes people make when cleaning hearing aids',
  'what the worlds longest living people may eat for breakfast',
  'what may cause frequent headaches',
  'dog treats that might have safety risks',
  'what a normal bone density looks like by age',
  '3 common foods that might trigger inflammation',
  'what cardiologists may want you to know about blood thinners',
  'what vitamin deficiency might cause difficulty walking'
];

function randomize() {
  var t = topics[Math.floor(Math.random() * topics.length)];
  document.getElementById('topic').value = t;
  go();
}

async function go() {
  var topic = document.getElementById('topic').value.trim();
  var err = document.getElementById('err');
  err.style.display = 'none';
  if (!topic) { err.textContent = 'Please enter a topic.'; err.style.display = 'block'; return; }

  var btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  try {
    var res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic: topic })
    });
    var d = await res.json();
    if (!res.ok) throw new Error(d.error || 'Server error');

    // Build ad text with yellow highlight
    var wU = d.white.toUpperCase();
    var yU = d.yellow.toUpperCase();
    document.getElementById('out-script').innerHTML =
      wU + ' <span style="color:#b8860b;font-weight:600">' + yU + '</span>';
    document.getElementById('out-text').textContent = d.text;
    document.getElementById('out-headline').textContent = d.headline;
    document.getElementById('ad-card').style.display = 'block';
    drawAd(wU, yU);
  } catch(e) {
    err.textContent = 'Error: ' + e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate';
  }
}

function drawAd(white, yellow) {
  var canvas = document.getElementById('ad-canvas');
  var ctx = canvas.getContext('2d');
  var W = 460, H = 460;
  var fullText = white + ' ' + yellow;
  var words = fullText.split(' ');
  var yellowWords = yellow.split(' ');

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  ctx.font = '900 36px Impact, Arial Black, Arial';
  ctx.textAlign = 'center';

  // Word wrap
  var lines = [], line = '';
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > 380 && line) { lines.push(line); line = words[i]; }
    else line = test;
  }
  if (line) lines.push(line);

  var lineH = 46;
  var totalH = lines.length * lineH;
  var startY = (H - totalH) / 2 - 20 + lineH;

  // Draw each line word by word for coloring
  for (var l = 0; l < lines.length; l++) {
    var lineWords = lines[l].split(' ');
    var lineWidth = ctx.measureText(lines[l]).width;
    var x = (W - lineWidth) / 2;
    var y = startY + l * lineH;
    for (var w = 0; w < lineWords.length; w++) {
      var word = lineWords[w];
      var isYellow = yellowWords.indexOf(word) >= 0;
      ctx.fillStyle = isYellow ? '#FFE500' : '#ffffff';
      ctx.fillText(word, x + ctx.measureText(word).width / 2, y);
      x += ctx.measureText(word + ' ').width;
    }
  }

  // LEARN MORE
  ctx.font = '700 22px Impact, Arial Black, Arial';
  ctx.fillStyle = '#ffffff';
  ctx.letterSpacing = '3px';
  ctx.fillText('LEARN MORE', W / 2, H - 36);
}

function dlAd() {
  var canvas = document.getElementById('ad-canvas');
  var a = document.createElement('a');
  a.download = 'ad.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function cp(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).innerText);
  btn.textContent = '✓ Copied';
  setTimeout(function(){ btn.textContent = 'Copy'; }, 1500);
}

function cpAll() {
  var s = document.getElementById('out-script').innerText;
  var t = document.getElementById('out-text').innerText;
  var h = document.getElementById('out-headline').innerText;
  navigator.clipboard.writeText('Creative Script:\n' + s + '\n\nText:\n' + t + '\n\nHeadline:\n' + h);
}
</script>
</body>
</html>
